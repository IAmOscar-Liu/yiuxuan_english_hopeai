<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>對話摘要</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"
    ></script>
    <style>
      body {
        background-color: #fff;
        color: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      .summary-container {
        padding: 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      .activity-card {
        background-color: #f4fbf4;
        border: 1px solid #e0eee0;
        border-radius: 20px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        color: #2c3e50;
      }
      .activity-card-content {
        display: flex;
        align-items: center;
        gap: 30px;
        width: 100%;
      }
      .rings-container {
        position: relative;
        width: 160px;
        height: 160px;
      }
      .ring-svg {
        transform: rotate(-90deg);
        width: 100%;
        height: 100%;
      }
      .ring-circle-bg {
        fill: none;
        stroke-width: 14;
        opacity: 0.1;
      }
      .ring-circle {
        fill: none;
        stroke-width: 14;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.5s ease-out;
      }
      .stats-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        flex-grow: 1;
      }
      .stat-item {
        display: flex;
        flex-direction: column;
      }
      .stat-label {
        font-size: 1.1rem;
        font-weight: 600;
      }
      .stat-value {
        font-size: 1.6rem;
        font-weight: 700;
      }
      .stat-unit {
        font-size: 1.1rem;
        font-weight: 500;
        color: #6c757d;
        margin-left: 4px;
      }

      /* Ring Colors - Optimized for Light Background */
      .ring-hope {
        stroke: #ff4757;
      }
      .ring-hope-bg {
        stroke: #ff4757;
      }
      .text-hope {
        color: #ff4757;
      }

      .ring-control {
        stroke: #2ed573;
      }
      .ring-control-bg {
        stroke: #2ed573;
      }
      .text-control {
        color: #2ed573;
      }

      .ring-action {
        stroke: #1e90ff;
      }
      .ring-action-bg {
        stroke: #1e90ff;
      }
      .text-action {
        color: #1e90ff;
      }

      #loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">載入中...</span>
      </div>
      <div class="mt-3 text-dark">計算數據中...</div>
    </div>

    <main class="summary-container">
      <h2 class="mb-4 text-center">我的對話摘要</h2>

      <div class="activity-card shadow">
        <h5 class="mb-0">對話紀錄圓圈</h5>
        <div class="activity-card-content">
          <div class="rings-container">
            <svg class="ring-svg" viewBox="0 0 160 160">
              <!-- Hope Ring (Outer) -->
              <circle
                class="ring-circle-bg ring-hope-bg"
                cx="80"
                cy="80"
                r="70"
              />
              <circle
                id="hope-ring"
                class="ring-circle ring-hope"
                cx="80"
                cy="80"
                r="70"
              />

              <!-- Control Ring (Middle) -->
              <circle
                class="ring-circle-bg ring-control-bg"
                cx="80"
                cy="80"
                r="54"
              />
              <circle
                id="control-ring"
                class="ring-circle ring-control"
                cx="80"
                cy="80"
                r="54"
              />

              <!-- Action Ring (Inner) -->
              <circle
                class="ring-circle-bg ring-action-bg"
                cx="80"
                cy="80"
                r="38"
              />
              <circle
                id="action-ring"
                class="ring-circle ring-action"
                cx="80"
                cy="80"
                r="38"
              />
            </svg>
          </div>

          <div class="stats-container">
            <div class="stat-item">
              <span class="stat-label">希望</span>
              <span class="stat-value text-hope">
                <span id="hope-val">-</span
                ><span class="stat-unit">/ 7 次</span>
              </span>
            </div>
            <div class="stat-item">
              <span class="stat-label">掌控</span>
              <span class="stat-value text-control">
                <span id="control-val">-</span
                ><span class="stat-unit">/ 10 分</span>
              </span>
            </div>
            <div class="stat-item">
              <span class="stat-label">行動</span>
              <span class="stat-value text-action">
                <span id="action-val">-</span
                ><span class="stat-unit">/ 10 分</span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div id="error-msg" class="mt-4 text-danger text-center d-none"></div>
    </main>

    <script type="module" src="./chat-summary.js" defer></script>
  </body>
</html>
