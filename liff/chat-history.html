<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的對話紀錄</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"
    ></script>
    <style>
      .card-link {
        text-decoration: none;
        color: inherit;
      }
      .card-link:hover .card {
        background-color: #f8f9fa;
      }
      .summary-truncate {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .date-input-container {
        position: relative;
      }
      .date-clear-btn {
        position: absolute;
        right: 28px; /* Moved closer to the right edge */
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        padding: 0;
        border: none;
        background: transparent;
        color: #6c757d;
        display: none;
      }
      .date-clear-btn.visible {
        display: block;
      }
      .match-btn-sm {
        font-size: 0.875rem;
        padding: 0.25rem 0.5rem;
        line-height: 1.5;
        display: inline-flex;
        align-items: center;
        height: 31px; /* Standard btn-sm height */
      }
      input[type="date"] {
        text-align: start;
        padding-right: 60px; /* Make room for X and picker icon */
      }
    </style>
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <div id="loading" class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">載入中...</span>
        </div>
        <div class="mt-2">載入中，請稍候...</div>
      </div>
      <div id="chat-list" class="d-none">
        <h2 id="page-title" class="mb-4 text-center">我的對話紀錄</h2>

        <div class="mb-4 card shadow-sm p-3">
          <h6 class="card-title">篩選條件</h6>
          <div class="row g-2 align-items-end">
            <div class="col-md-4 d-none" id="target-filter-container">
              <label for="target-select" class="form-label">對象</label>
              <select id="target-select" class="form-select"></select>
            </div>

            <div class="col-md-4">
              <label for="filter-select" class="form-label">選擇時間範圍</label>
              <select id="filter-select" class="form-select">
                <option value="all" selected>所有時間</option>
                <option value="last-week">最近一週</option>
                <option value="last-month">最近一個月</option>
                <option value="custom">自訂</option>
              </select>
            </div>
            <div id="date-inputs-container" class="col-md-8 d-none">
              <div class="row g-2">
                <div class="col-md-5">
                  <label for="start-date" class="form-label">開始日期</label>
                  <div class="date-input-container">
                    <input type="date" id="start-date" class="form-control" />
                    <button
                      type="button"
                      id="clear-start-date"
                      class="date-clear-btn"
                    >
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>
                </div>
                <div class="col-md-5">
                  <label for="end-date" class="form-label">結束日期</label>
                  <div class="date-input-container">
                    <input type="date" id="end-date" class="form-control" />
                    <button
                      type="button"
                      id="clear-end-date"
                      class="date-clear-btn"
                    >
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </div>
                </div>
                <div class="col-md-2">
                  <label class="form-label d-none d-md-block">&nbsp;</label>
                  <button id="submit-date-btn" class="btn btn-primary w-100">
                    送出
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="chat-cards-container"></div>
      </div>
    </main>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">確認更新</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">確定要將此對話設為下次接續對話嗎？</div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              取消
            </button>
            <button type="button" id="confirmSetBtn" class="btn btn-primary">
              確定
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div
      class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3"
    >
      <div
        id="successToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">更新成功！</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <script type="module" src="./chat-history.js" defer></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
