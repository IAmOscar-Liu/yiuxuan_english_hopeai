<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>個人資料</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      charset="utf-8"
      src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"
    ></script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .hidden {
        display: none;
      }
      ::placeholder {
        color: #adb5bd !important;
        opacity: 0.6 !important;
      }
      .profile-card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .profile-header {
        background-color: #06c755;
        color: white;
        padding: 2rem 1rem;
        text-align: center;
      }
      .info-item {
        margin-bottom: 1rem;
      }
      .info-label {
        font-size: 0.85rem;
        color: #6c757d;
        margin-bottom: 0.25rem;
      }
      .info-value {
        font-size: 1.1rem;
        font-weight: 500;
        color: #212529;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <!-- Loading Screen -->
      <div id="loading" class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">載入中，請稍候...</p>
      </div>

      <!-- Profile Display -->
      <div id="profile-container" class="hidden">
        <div class="card profile-card mx-auto" style="max-width: 500px">
          <div class="profile-header">
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="m-0">
                <i class="bi bi-person-circle me-2"></i>個人資料
              </h2>
              <button id="editBtn" class="btn btn-outline-light btn-sm">
                編輯
              </button>
            </div>
          </div>
          <div class="card-body p-4">
            <!-- View Mode -->
            <div id="view-mode">
              <h5 class="mb-3 border-bottom pb-2 text-primary">基本資料</h5>
              <div class="info-item">
                <div class="info-label">暱稱</div>
                <div class="info-value" id="nickname"></div>
              </div>
              <div class="info-item">
                <div class="info-label">電子郵件</div>
                <div class="info-value" id="email"></div>
              </div>
              <div class="info-item">
                <div class="info-label">年齡範圍</div>
                <div class="info-value" id="age-range"></div>
              </div>
              <div class="info-item">
                <div class="info-label">註冊時間</div>
                <div class="info-value" id="createdAt"></div>
              </div>
              <h5 class="mb-3 border-bottom pb-2 mt-4 text-primary">
                背景資訊
              </h5>
              <div class="info-item">
                <div class="info-label">目前身份</div>
                <div class="info-value" id="identity"></div>
              </div>
              <div class="info-item">
                <div class="info-label">主要用途</div>
                <div class="info-value" id="usage"></div>
              </div>
            </div>

            <!-- Edit Mode -->
            <div id="edit-mode" class="hidden">
              <form id="editForm">
                <h5 class="mb-3 border-bottom pb-2 text-primary">基本資料</h5>
                <div class="mb-3">
                  <label for="nickname-input" class="form-label"
                    >暱稱 <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="nickname-input"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email-input" class="form-label">電子郵件</label>
                  <input type="email" class="form-control" id="email-input" />
                </div>
                <div class="mb-3">
                  <label for="age-range-input" class="form-label"
                    >年齡範圍</label
                  >
                  <select class="form-select" id="age-range-input">
                    <option value="" selected disabled>請選擇</option>
                    <!-- Options will be injected -->
                  </select>
                </div>

                <h5 class="mb-3 border-bottom pb-2 mt-4 text-primary">
                  背景資訊
                </h5>
                <div class="mb-3">
                  <label for="identity-input" class="form-label"
                    >你目前最主要的身份比較接近哪一種？</label
                  >
                  <select class="form-select" id="identity-input">
                    <option value="" selected disabled>請選擇</option>
                    <!-- Options will be injected -->
                    <option value="其他">其他</option>
                  </select>
                  <input
                    type="text"
                    class="form-control mt-2 hidden"
                    id="identity-other-input"
                    placeholder="請輸入您的身份"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label"
                    >你這次主要想用它來做什麼？（可複選）</label
                  >
                  <div id="usage-container">
                    <!-- Checkboxes will be injected -->
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input usage-checkbox"
                      type="checkbox"
                      value="其他"
                      id="usage-other-checkbox"
                    />
                    <label class="form-check-label" for="usage-other-checkbox">
                      其他
                    </label>
                  </div>
                  <input
                    type="text"
                    class="form-control mt-2 hidden"
                    id="usage-other-input"
                    placeholder="請輸入其他用途"
                  />
                </div>

                <div class="d-flex gap-2">
                  <button
                    type="button"
                    class="btn btn-secondary flex-grow-1"
                    id="cancelBtn"
                  >
                    取消
                  </button>
                  <button
                    type="submit"
                    class="btn btn-primary flex-grow-1"
                    id="saveBtn"
                  >
                    儲存
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Update Success Modal -->
    <div
      class="modal fade"
      id="updateSuccessModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">更新成功</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">您的個人資料已成功更新。</div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              確定
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./profile.js" defer></script>
  </body>
</html>
